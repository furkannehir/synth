name: Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate updater signing secrets
        shell: python
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          import base64
          import os
          import sys

          raw_key = os.environ.get("TAURI_SIGNING_PRIVATE_KEY", "").strip()
          password = os.environ.get("TAURI_SIGNING_PRIVATE_KEY_PASSWORD", "")

          if not raw_key:
              print("TAURI_SIGNING_PRIVATE_KEY secret is required.")
              sys.exit(1)

          if not password:
              print("TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is required.")
              sys.exit(1)

          try:
              decoded_key = base64.b64decode(raw_key, validate=True).decode("utf-8")
          except Exception:
              print(
                  "TAURI_SIGNING_PRIVATE_KEY must be the raw base64 key content "
                  "from synth.key (do not decode it before saving as a GitHub secret)."
              )
              sys.exit(1)

          if not decoded_key.startswith("untrusted comment:"):
              print(
                  "Decoded TAURI_SIGNING_PRIVATE_KEY is invalid. "
                  "Regenerate keys and copy synth.key file content exactly."
              )
              sys.exit(1)

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "Synth v__VERSION__"
          releaseBody: "See assets below to download and install this version."
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: --target ${{ matrix.target }}
